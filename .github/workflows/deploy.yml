name: Enterprise DevOps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore employee-api/EmployeeApi/EmployeeApi.csproj

      - name: Build Application
        run: dotnet build employee-api/EmployeeApi/EmployeeApi.csproj --configuration Release --no-restore

      - name: Publish Application
        run: dotnet publish employee-api/EmployeeApi/EmployeeApi.csproj --configuration Release --no-build -o publish

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t edbinbaby1827/enterprise-devops-project:latest \
            ./employee-api/EmployeeApi

      - name: Push Docker Image
        run: |
          docker push edbinbaby1827/enterprise-devops-project:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/enterprise-devops-project

            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            docker compose pull

            docker compose down

            docker compose up -d

            sleep 30

            docker compose ps

            curl http://localhost/api/employees
